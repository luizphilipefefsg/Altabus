<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Altabus</title>
</head>
<body>

    <h1>Cadastro - Altabus</h1>

    <form action="/cadastro" method="POST">

        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <br><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required>

        <br><br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(27) 99999-9999">

        <br><br>

        <label for="data">Data de nascimento:</label>
        <input type="date" id="data" name="data">

        <br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

        <br><br>

        <label>
            <input type="checkbox" name="termos" required>
            Aceito os termos de uso
        </label>

        <br><br>

        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>

    </form>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Altabus</title>
</head>
<body>

    <h1>Login - Altabus</h1>

    <form action="/login" method="POST">

        <label for="email-login">E-mail:</label>
        <input type="email" id="email-login" name="email" placeholder="Digite seu e-mail" required>

        <br><br>

        <label for="senha-login">Senha:</label>
        <input type="password" id="senha-login" name="senha" placeholder="Digite sua senha" required>

        <br><br>

        <label>
            <input type="checkbox" name="lembrar">
            Lembrar de mim
        </label>

        <br><br>

        <button type="submit">Entrar</button>
        <button type="reset">Limpar</button>

    </form>

</body>
</html>
